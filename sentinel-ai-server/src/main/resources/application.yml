server:
  port: 8090

spring:
  application:
    name: sentinel-ai
  threads:
    virtual:
      enabled: true
  profiles:
    active: dev
  ai:
    openai:
      chat:
        enabled: false
    chat:
      client:
        enabled: false
    mcp:
      server:
        enabled: true
        name: sentinel-ai-mcp-server
        version: 1.0.0
        protocol: STREAMABLE
        type: SYNC
        instructions: >
          Sentinel AI SQL分析服务器 — 提供SQL性能分析、风险检测、项目管理等工具。
          可以查询有风险的SQL、获取分析详情、查看项目概览等。
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        streamable-http:
          mcp-endpoint: /mcp
sentinel:
  ai:
    enabled: false
    model: qwen3.5-plus
    api-key: ${AI_DASHSCOPE_API_KEY:}
    temperature: 0.2
    max-ai-calls-per-scan: -1

mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.zhuangjie.sentinel: debug
